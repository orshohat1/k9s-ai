version: 2

project_name: k9s-ai

before:
  hooks:
    - go mod download
    - go generate ./...
    - sh -c "go tool bundler || true"

release:
  prerelease: false

env:
  - CGO_ENABLED=0

builds:
  - id: linux
    goos:
      - linux
    goarch:
      - amd64
      - arm64
      - arm
      - ppc64le
      - s390x
    goarm:
      - 7
    flags:
      - -trimpath
    ldflags:
      - -s -w -X {{.ModulePath}}/cmd.version={{.Version}} -X {{.ModulePath}}/cmd.commit={{.ShortCommit}} -X {{.ModulePath}}/cmd.date={{.Date}}

  - id: freebsd
    goos:
      - freebsd
    goarch:
      - amd64
      - arm64
    goarm:
      - 7
    flags:
      - -trimpath
    ldflags:
      - -s -w -X {{.ModulePath}}/cmd.version={{.Version}} -X {{.ModulePath}}/cmd.commit={{.ShortCommit}} -X {{.ModulePath}}/cmd.date={{.Date}}

  - id: osx
    goos:
      - darwin
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X {{.ModulePath}}/cmd.version={{.Version}} -X {{.ModulePath}}/cmd.commit={{.ShortCommit}} -X {{.ModulePath}}/cmd.date={{.Date}}

  - id: windows
    goos:
      - windows
    goarch:
      - amd64
      - arm64
    flags:
      - -trimpath
    ldflags:
      - -s -w -X {{.ModulePath}}/cmd.version={{.Version}} -X {{.ModulePath}}/cmd.commit={{.ShortCommit}} -X {{.ModulePath}}/cmd.date={{.Date}}

archives:
  - name_template: >-
      {{ .ProjectName }}_
      {{- title .Os }}_
      {{- if eq .Arch "amd64" }}amd64
      {{- else if eq .Arch "386" }}i386
      {{- else }}{{ .Arch }}{{ end }}
      {{- if .Arm }}v{{ .Arm }}{{ end }}
    format_overrides:
      - goos: windows
        formats: ["zip"]

brews:
  - name: k9s-ai
    repository:
      owner: orshohat1
      name: k9s-ai
    directory: Formula
    homepage: https://github.com/orshohat1/k9s-ai
    description: "K9s AI — Kubernetes CLI with built-in AI/Copilot assistant"
    license: Apache-2.0
    install: |
      bin.install "k9s-ai"
      generate_completions_from_executable(bin/"k9s-ai", "completion")
    test: |
      system "#{bin}/k9s-ai", "version"

scoops:
  - name: k9s-ai
    repository:
      owner: orshohat1
      name: k9s-ai
    homepage: https://github.com/orshohat1/k9s-ai
    description: "K9s AI — Kubernetes CLI with built-in AI/Copilot assistant"
    license: Apache-2.0

nfpms:
  - id: k9s-ai
    file_name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    package_name: k9s-ai
    vendor: orshohat1
    homepage: https://github.com/orshohat1/k9s-ai
    maintainer: Or Shohat
    description: "K9s AI — Kubernetes CLI with built-in AI/Copilot assistant"
    license: Apache-2.0
    formats:
      - deb
      - rpm
      - apk
    bindir: /usr/bin
    section: utils
    contents:
      - src: ./LICENSE
        dst: /usr/share/doc/k9s-ai/copyright
        file_info:
          mode: 0644

snapcrafts:
  - id: k9s-ai
    name: k9s-ai
    summary: "K9s AI — Kubernetes CLI with built-in AI/Copilot assistant"
    description: |
      K9s AI provides a terminal UI to interact with your Kubernetes clusters
      with built-in AI/GitHub Copilot assistant for diagnostics, security
      auditing, and resource optimization.
    grade: stable
    confinement: strict
    license: Apache-2.0
    apps:
      k9s-ai:
        command: k9s-ai
        plugs:
          - home
          - network
          - network-bind
          - personal-files

dockers:
  - image_templates:
      - "orshohat/k9s-ai:{{ .Version }}-amd64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/amd64"
    goarch: amd64
  - image_templates:
      - "orshohat/k9s-ai:{{ .Version }}-arm64"
    use: buildx
    build_flag_templates:
      - "--platform=linux/arm64"
    goarch: arm64

docker_manifests:
  - name_template: "orshohat/k9s-ai:{{ .Version }}"
    image_templates:
      - "orshohat/k9s-ai:{{ .Version }}-amd64"
      - "orshohat/k9s-ai:{{ .Version }}-arm64"
  - name_template: "orshohat/k9s-ai:latest"
    image_templates:
      - "orshohat/k9s-ai:{{ .Version }}-amd64"
      - "orshohat/k9s-ai:{{ .Version }}-arm64"

checksum:
  name_template: "checksums.sha256"

snapshot:
  version_template: "{{ .Tag }}-next"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

sboms:
  - artifacts: archive
